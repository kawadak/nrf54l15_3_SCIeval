# ==============================
# Logging / Console
# ==============================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# スタック余裕（ログやBLE処理のため）
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ==============================
# Bluetooth (Peripheral/Server)
# ==============================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
# CONFIG_BT_GATT_SERVER は存在しないため指定不要（Peripheralで自動的にGATTサーバ有効）

# デバイス名（Central側が検索する名前に合わせる）
CONFIG_BT_DEVICE_NAME="0514_Test_peripheral"
CONFIG_BT_DEVICE_APPEARANCE=0

# 接続数（必要に応じて調整）
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# ==============================
# PHY / Data Length / MTU
# ==============================
# 2M PHY（ホスト側手続きとコントローラの2M対応）
CONFIG_BT_PHY_UPDATE=y
CONFIG_BT_CTLR_PHY_2M=y

# Data Length Update（bt_conn_le_data_len_update() を使う）
CONFIG_BT_DATA_LEN_UPDATE=y

# ATT MTU（L2CAP TX MTUはMTUに依存）
CONFIG_BT_ATT_PREPARE_COUNT=0
CONFIG_BT_L2CAP_TX_MTU=247

# ACLバッファはデフォルトを使用する
# ※以下のようなシンボルは環境によって未定義のため設定しない
# CONFIG_BT_BUF_ACL_TX_SIZE=
# CONFIG_BT_BUF_ACL_RX_SIZE=
# CONFIG_BT_BUF_ACL_TX_COUNT=
# CONFIG_BT_BUF_ACL_RX_COUNT=

# ==============================
# Nordic LED Button Service (LBS)
# ==============================
CONFIG_BT_LBS=y

# ==============================
# Security（任意）
# ==============================
CONFIG_BT_SMP=n

# ==============================
# その他（必要に応じて）
# ==============================
# GPIOドライバ等はボード定義で有効になっています